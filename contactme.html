<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="stylecontact.css">
  <link rel="icon" href="assets/iconweb.png"/>
</head>
<body>
  <div>
    <nav>
      <div class="navbar-left">
          <a href="#">
              <img class="web-logo" src="assets/iconweb.png" alt="Icon P"/>
          </a>
          <ul class="navbar-links">
            <li>
              <a href="index.html" class="link-active"> Home </a>
            </li>
            <li>
              <a href="#" class="link"> Blog </a>
            </li>
          </ul>
      </div>
      
      <div class="navbar-right">
        <a href="contactme.html" class="contact-link">Contact Me</a>
      </div>
    </nav>
  </div>

  <main class="contact-section">
  <form id="contactForm" class="contact-form">
    <h1 style="text-align: center;">Contact Me</h1>
    <div class="form-field">
      <label for="name">Name</label>
      <input id="name" name="name" class="form-input" type="text" placeholder="Name" required></input>
    </div>

    <div class="form-field">
      <label for="email">Email</label>
      <input id="email" name="email" class="form-input" type="email" placeholder="Email" required></input>
    </div>

    <div class="form-field">
      <label for="phone">Phone Number</label>
      <input id="phone" name="phone" class="form-input" type="number" placeholder="Phone Number" required></input>
    </div>

    <div class="form-field">
      <label for="subject">Subject</label>
      <input id="subject" name="subject" class="form-input" placeholder="Subject" required></input>
    </div>

    <div class="form-field">
      <label for="skill">Skill</label>
      <select id="skill" name="skill" class="form-input" required>
        <option value="frontend">Frontend</option>
        <option value="backend">Backend</option>
      </select>
    </div>

    <div class="form-field">
      <label for="message">Message</label>
      <textarea id="message" name="message" class="form-input" required> </textarea>
    </div>

    <button class="form-submit-button" type="submit" >
      Submit
    </button>
  </form>
</main>
<script src="submitform.js"> </script>
<script src="belajar.-js.js"> </script>

</body>
</html>
